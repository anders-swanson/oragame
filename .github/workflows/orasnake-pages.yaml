name: Deploy Oragame Arcade to Pages

on:
  push:
    branches: ['main']
    paths:
      - 'arcade/**'
      - 'orasnake/**'
      - '.github/workflows/orasnake-pages.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: oragame-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            arcade/package-lock.json
            orasnake/package-lock.json

      - name: Install arcade dependencies
        working-directory: arcade
        run: npm ci

      - name: Build arcade landing page
        working-directory: arcade
        run: npm run build -- --base=/oragame/

      - name: Install Orasnake dependencies
        working-directory: orasnake
        run: npm ci

      - name: Test Orasnake
        working-directory: orasnake
        run: npm test

      - name: Build Orasnake
        working-directory: orasnake
        run: npm run build -- --base=/oragame/snake/

      - name: Stage Pages artifact
        run: |
          rm -rf pages
          mkdir -p pages/snake
          cp -R arcade/dist/. pages/
          cp -R orasnake/dist/. pages/snake/
          touch pages/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
